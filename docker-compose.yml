
services:
  # Base de Datos PostgreSQL con extensión PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: LeadchainDB
    restart: unless-stopped
    ports:
      - "${DB_PORT}:5432" # Expone el puerto 5432 definido en tu .env 
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - Leadchain

  # Backend Laravel (PHP 8.2 + Apache)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: leadchain_Api
    restart: unless-stopped
    ports:
      # Mapeamos el puerto 8000 de tu PC al puerto 80 (Apache) del contenedor 
      - "${BACKEND_PORT}:80"
    env_file:
      - .env
    environment:
      # Aseguramos que las variables críticas se pasen correctamente
      DB_HOST: postgres
      SEEDER_CLASS: "${SEEDER_CLASS}"
    depends_on:
      - postgres
    networks:
      - Leadchain

  # Frontend (Vite + Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Pasa la URL de la API durante la construcción para que Vite la reconozca 
        VITE_API_BASE_URL: "${VITE_API_BASE_URL}"
    container_name: leadchain_Frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - Leadchain

volumes:
  postgres_data:

networks:
  Leadchain:
    name: Leadchain